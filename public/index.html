<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Api_IA · OpenRouter Chat</title>
    <style>
      :root {
        --bg: #0b0d12;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.68);
        --accent: #9aa7ff;
        --danger: #ff7a7a;
        --shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
        --radius: 14px;
        --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji",
          "Segoe UI Emoji";
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        font-family: var(--sans);
        color: var(--text);
        background: radial-gradient(1200px 800px at 20% 15%, rgba(154, 167, 255, 0.16), transparent 55%),
          radial-gradient(1000px 700px at 85% 20%, rgba(120, 255, 229, 0.10), transparent 55%), var(--bg);
      }

      a {
        color: inherit;
        text-decoration: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 36px 18px 56px;
      }

      header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.2px;
      }

      .sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
        margin-top: 16px;
      }

      @media (min-width: 920px) {
        .grid {
          grid-template-columns: 380px 1fr;
          align-items: start;
        }
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
        border-radius: var(--radius);
        padding: 14px;
        backdrop-filter: blur(10px);
      }

      label {
        display: block;
        font-size: 12px;
        color: var(--muted);
        margin: 8px 0 6px;
      }

      input,
      textarea,
      button {
        font: inherit;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 11px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.2);
        color: var(--text);
        outline: none;
      }

      textarea {
        min-height: 128px;
        resize: vertical;
        line-height: 1.45;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(154, 167, 255, 0.55);
        box-shadow: 0 0 0 3px rgba(154, 167, 255, 0.12);
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .actions {
        display: flex;
        gap: 10px;
        margin-top: 12px;
      }

      button {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(154, 167, 255, 0.12);
        color: var(--text);
        cursor: pointer;
      }

      button:hover {
        border-color: rgba(154, 167, 255, 0.55);
      }

      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }

      .ghost {
        background: transparent;
      }

      .status {
        margin-top: 10px;
        font-size: 12px;
        color: var(--muted);
      }

      .status b {
        color: var(--text);
        font-weight: 600;
      }

      .error {
        color: var(--danger);
        white-space: pre-wrap;
        font-family: var(--mono);
        font-size: 12px;
        margin-top: 10px;
      }

      pre {
        margin: 0;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.25);
        overflow: auto;
        min-height: 300px;
        max-height: 70vh;
        font-family: var(--mono);
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .pill {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(0, 0, 0, 0.2);
        color: var(--muted);
        font-size: 12px;
      }

      .pill code {
        font-family: var(--mono);
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <div>
          <h1>Api_IA · Playground</h1>
          <div class="sub">
            Prueba <code>/chat</code> en streaming (SSE) con OpenRouter.
            Si no ves tokens progresivos, ejecuta la API con Bun y usa este HTML desde la misma URL.
          </div>
        </div>
        <div class="pill">Endpoint <code>POST /chat</code></div>
      </header>

      <div class="grid">
        <section class="card">
          <form id="form">
            <div class="row">
              <div>
                <label for="model">Modelo (opcional)</label>
                <input id="model" placeholder="openrouter/free" />
              </div>
            </div>

            <label for="prompt">Prompt</label>
            <textarea id="prompt" placeholder="Escribe aquí tu prompt...">Cuenta del 1 al 30, despacio.</textarea>

            <div class="actions">
              <button id="send" type="submit">Enviar (stream)</button>
              <button id="stop" class="ghost" type="button" disabled>Parar</button>
              <button id="clear" class="ghost" type="button">Limpiar</button>
            </div>

            <div class="status" id="status">Listo.</div>
            <div class="error" id="error" hidden></div>
          </form>
        </section>

        <section class="card">
          <pre id="out"></pre>
        </section>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const form = $("form");
      const out = $("out");
      const statusEl = $("status");
      const errorEl = $("error");
      const sendBtn = $("send");
      const stopBtn = $("stop");
      const clearBtn = $("clear");
      const promptEl = $("prompt");
      const modelEl = $("model");
      const baseUrl = location.origin;

      let abortController = null;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function showError(text) {
        errorEl.hidden = !text;
        errorEl.textContent = text || "";
      }

      function append(text) {
        out.textContent += text;
        out.scrollTop = out.scrollHeight;
      }

      function resetOutput() {
        out.textContent = "";
        showError("");
      }

      function setBusy(busy) {
        sendBtn.disabled = busy;
        stopBtn.disabled = !busy;
      }

      function parseSseAndAppend(reader, onEvent) {
        const decoder = new TextDecoder();
        let buffer = "";

        return reader.read().then(function process(result) {
          if (result.done) return;
          buffer += decoder.decode(result.value, { stream: true });

          let idx;
          while ((idx = buffer.indexOf("\n\n")) !== -1) {
            const rawEvent = buffer.slice(0, idx);
            buffer = buffer.slice(idx + 2);

            let eventName = "message";
            const dataLines = [];

            for (const line of rawEvent.split("\n")) {
              if (line.startsWith("event:")) eventName = line.slice(6).trim();
              if (line.startsWith("data:")) dataLines.push(line.slice(5).trim());
            }

            const dataStr = dataLines.join("\n");
            let data = dataStr;
            try {
              data = JSON.parse(dataStr);
            } catch {}
            onEvent({ event: eventName, data });
          }

          return reader.read().then(process);
        });
      }

      async function sendStream() {
        const prompt = promptEl.value.trim();
        if (!prompt) return;

        resetOutput();
        setBusy(true);
        setStatus("Conectando…");
        showError("");

        abortController = new AbortController();
        const model = modelEl.value.trim();

        const payload = model ? { prompt, model } : { prompt };

        try {
          const res = await fetch(baseUrl + "/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "text/event-stream",
            },
            body: JSON.stringify(payload),
            signal: abortController.signal,
          });

          if (!res.ok) {
            const text = await res.text().catch(() => "");
            throw new Error(`HTTP ${res.status}\n\n${text}`);
          }

          if (!res.body) throw new Error("El navegador no soporta streams en fetch()");

          setStatus("Recibiendo stream…");

          const reader = res.body.getReader();
          let metaModel = null;
          let done = false;

          await parseSseAndAppend(reader, ({ event, data }) => {
            if (event === "meta" && data && typeof data === "object") {
              metaModel = data.model || null;
              setStatus(`Modelo: ${metaModel || "?"} · streameando…`);
              return;
            }

            if (event === "delta" && data && typeof data === "object" && typeof data.content === "string") {
              append(data.content);
              return;
            }

            if (event === "done") {
              done = true;
              const rt = data && typeof data === "object" ? data.reasoningTokens : null;
              setStatus(`Listo. Modelo: ${metaModel || "?"} · reasoningTokens: ${rt ?? "null"}`);
              return;
            }

            if (event === "error") {
              const msg = data && typeof data === "object" ? data.message : String(data);
              showError(msg || "Error desconocido");
              setStatus("Error en stream.");
            }
          });

          if (!done) setStatus("Conexión cerrada.");
        } finally {
          abortController = null;
          setBusy(false);
        }
      }

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        if (abortController) return;
        void sendStream();
      });

      stopBtn.addEventListener("click", () => {
        if (abortController) abortController.abort();
      });

      clearBtn.addEventListener("click", () => {
        resetOutput();
        setStatus("Listo.");
      });
    </script>
  </body>
</html>
